name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag or release name to publish artifacts under
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "0"

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: ./script/linux
      - name: Install WASI SDK
        run: ./script/download-wasi-sdk
      - name: Build release binaries
        run: cargo build --locked --release --package zed --package cli --package remote_server
      - name: Package binaries
        run: |
          mkdir -p release-artifacts/rezed-linux-x86_64
          cp target/release/zed release-artifacts/rezed-linux-x86_64/rezed
          cp target/release/cli release-artifacts/rezed-linux-x86_64/zed
          cp target/release/remote_server release-artifacts/rezed-linux-x86_64/remote_server
          tar -C release-artifacts -czf rezed-linux-x86_64.tar.gz rezed-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: rezed-linux-x86_64
          path: rezed-linux-x86_64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build release binaries
        run: cargo build --locked --release --package zed --package cli --package remote_server
      - name: Package binaries
        run: |
          mkdir -p release-artifacts/rezed-macos-arm64
          cp target/release/zed release-artifacts/rezed-macos-arm64/rezed
          cp target/release/cli release-artifacts/rezed-macos-arm64/zed
          cp target/release/remote_server release-artifacts/rezed-macos-arm64/remote_server
          tar -C release-artifacts -czf rezed-macos-arm64.tar.gz rezed-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: rezed-macos-arm64
          path: rezed-macos-arm64.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - linux
      - macos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --draft --title "$TAG" --notes "Rezed release $TAG"
          gh release upload "$TAG" release-artifacts/* --clobber
