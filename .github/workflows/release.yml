name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag or release name to publish artifacts under
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "0"

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Set stable release channel
        run: |
          printf 'stable' > crates/zed/RELEASE_CHANNEL
          printf 'stable' > RELEASE_CHANNEL
      - name: Install Linux dependencies
        run: ./script/linux
      - name: Install WASI SDK
        run: ./script/download-wasi-sdk
      - name: Build Linux release archive
        env:
          REMOTE_SERVER_TARGET: x86_64-unknown-linux-gnu
        run: ./script/bundle-linux
      - uses: actions/upload-artifact@v4
        with:
          name: rezed-linux-x86_64
          path: target/release/rezed-linux-x86_64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Set stable release channel
        run: |
          printf 'stable' > crates/zed/RELEASE_CHANNEL
          printf 'stable' > RELEASE_CHANNEL
      - name: Build macOS DMG
        run: ./script/bundle-mac aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: Rezed-aarch64.dmg
          path: target/aarch64-apple-darwin/release/Rezed-aarch64.dmg
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: rezed-remote-server-macos-aarch64.gz
          path: target/rezed-remote-server-macos-aarch64.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - linux
      - macos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --draft --title "$TAG" --notes "Rezed release $TAG"
          gh release delete-asset "$TAG" rezed-macos-arm64.tar.gz -y 2>/dev/null || true
          gh release upload "$TAG" release-artifacts/* --clobber
